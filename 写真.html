<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>写真</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        #container {
            column-count: 3; /* 列数 */
            column-gap: 10px; /* 列间隙 */
            margin: 20px auto; /* 设置边距并居中 */
            max-width: 1200px; /* 最大宽度 */
            padding: 0 10px; /* 左右内边距 */
            display: none; /* 默认隐藏 */
        }
        .item {
            display: inline-block;
            margin-bottom: 10px;
            width: 100%; /* 设置宽度为列宽 */
            break-inside: avoid; /* 防止元素在列中断 */
        }
        .item img {
            width: 100%;
            display: block;
            border-radius: 5px; /* 图片圆角 */
        }
        #backBtn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #007bff;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #passwordPrompt {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #fff;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        #passwordInput {
            margin-bottom: 10px;
            width: 100%;
            padding: 5px;
            box-sizing: border-box;
        }
        #submitBtn {
            background-color: #007bff;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="passwordPrompt">
        <input type="password" id="passwordInput" placeholder="请输入密码">
        <button id="submitBtn" onclick="checkPassword()">确认</button>
    </div>

    <div id="container">

        <div class="item"><img src="https://img.16k.club/mofish/2024-05-07/3390459317efb6c6ffe1f375f0d971b5.webp" alt="Image 4"></div>
        <div class="item"><img src="https://img.16k.club/mofish/2024-05-07/106bc947d5159501e6c9326129a27d11.webp" alt="Image 5"></div>
        <div class="item"><img src="https://img.16k.club/mofish/2024-05-04/bc71678c8dd9c48a73520746f05d05c4.webp" alt="Image 6"></div>

        <div class="item"><img src="https://img.16k.club/mofish/2024-04-20/72a916c91b16fa5741cf4812877de7ab.webp" alt="Image 10"></div>

        <!-- <div class="item"><img src="image3.jpg" alt="Image 3"></div> -->
    </div>

    <button id="backBtn" onclick="goBack('homepages.html')">返回主页</button>

    <script>
        var correctPassword = "131477"; // 正确的密码

        function goBack() {
            window.location.href = "index.html"; // 返回到主页的 URL
        }

        function checkPassword() {
            var passwordInput = document.getElementById("passwordInput").value;
            if (passwordInput === correctPassword) {
                document.getElementById("passwordPrompt").style.display = "none";
                document.getElementById("container").style.display = "block";
            } else {
                alert("密码错误，请重新输入。");
            }
        }
    </script>
</body>
</html>

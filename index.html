<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mylove</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }

        .full-screen-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('439696030_18020551391489136_154610390776499775_n.jpeg');
            background-size: cover;
            background-position: center;
        }

        #playButton {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            padding: 10px;
            font-size: 16px;
        }

        #debugInfo {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            background-color: rgba(0,0,0,0.5);
            padding: 10px;
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>
    <div class="full-screen-image"></div>
    <button id="playButton">播放音乐</button>
    <div id="debugInfo"></div>
    <audio id="background-music" loop>
        <source src="RPReplay_Final1723556121.m4a" type="audio/mp4">
        Your browser does not support the audio element.
    </audio>

    <script>
        var music = document.getElementById("background-music");
        var playButton = document.getElementById("playButton");
        var debugInfo = document.getElementById("debugInfo");

        function updateDebugInfo(message) {
            debugInfo.innerHTML += message + "<br>";
        }

        function playMusic() {
            updateDebugInfo("尝试播放音乐...");
            var playPromise = music.play();

            if (playPromise !== undefined) {
                playPromise.then(_ => {
                    updateDebugInfo("音乐开始播放");
                    playButton.textContent = "暂停音乐";
                })
                .catch(error => {
                    updateDebugInfo("播放失败：" + error);
                });
            }
        }

        playButton.onclick = function() {
            if (music.paused) {
                playMusic();
            } else {
                music.pause();
                updateDebugInfo("音乐已暂停");
                playButton.textContent = "播放音乐";
            }
        };

        window.onload = function() {
            updateDebugInfo("页面已加载");
            updateDebugInfo("音频文件路径: " + music.currentSrc);
            playMusic();  // 尝试自动播放
        }
    </script>
</body>
</html>

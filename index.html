
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I'm Learning</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .container {
            height: 100%;
            background-image: url('https://im.gurl.eu.org/file/127c1346c35b4a91f963e.jpg');

            background-size: cover;

        }

</head>

    <div class="container">
        <div class="text">I'm learning</div>

</html>

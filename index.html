<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sakura</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        .full-screen-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('439696030_18020551391489136_154610390776499775_n.jpeg');
            background-size: cover;
            background-position: center;
        }

        #player-controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 80%;
            max-width: 500px;
        }

        .control-buttons {
            display: flex;
            justify-content: center;
            margin-bottom: 10px;
        }

        button {
            margin: 0 5px;
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
        }

        button:hover {
            background-color: #45a049;
        }

        #song-info {
            color: white;
            margin: 10px 0;
            font-size: 18px;
        }

        #progress-bar {
            width: 100%;
            height: 5px;
            background-color: #ddd;
            cursor: pointer;
            margin-bottom: 10px;
        }

        #progress {
            width: 0;
            height: 100%;
            background-color: #4CAF50;
        }

        #volume-control {
            display: flex;
            align-items: center;
            color: white;
        }

        #volume-slider {
            width: 100px;
            margin: 0 10px;
        }

        #debugInfo {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background-color: rgba(0,0,0,0.5);
            padding: 10px;
            max-height: 200px;
            overflow-y: auto;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="full-screen-image"></div>
    <div id="player-controls">
        <div id="song-info">准备播放</div>
        <div id="progress-bar"><div id="progress"></div></div>
        <div class="control-buttons">
            <button id="prevButton">上一首</button>
            <button id="playButton">播放</button>
            <button id="nextButton">下一首</button>
        </div>
        <div id="volume-control">
            音量: <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="1">
        </div>
    </div>
    <div id="debugInfo"></div>
    <audio id="background-music"></audio>

    <script>
        const music = document.getElementById("background-music");
        const playButton = document.getElementById("playButton");
        const prevButton = document.getElementById("prevButton");
        const nextButton = document.getElementById("nextButton");
        const songInfo = document.getElementById("song-info");
        const debugInfo = document.getElementById("debugInfo");
        const progressBar = document.getElementById("progress-bar");
        const progress = document.getElementById("progress");
        const volumeSlider = document.getElementById("volume-slider");

        const playlist = [
            {title: "起风了（旧版）", src: "music.mp3"},
            {title: "情歌-梁静茹", src: "music1.mp3"},
            {title: "盗将行-花粥", src: "music2.mp3"},
            // 在这里添加更多歌曲
        ];

        let currentSongIndex = 0;

        function updateDebugInfo(message) {
            const now = new Date().toLocaleTimeString();
            debugInfo.innerHTML += `${now}: ${message}<br>`;
            debugInfo.scrollTop = debugInfo.scrollHeight;
        }

        function loadSong(index) {
            const song = playlist[index];
            music.src = song.src;
            songInfo.textContent = `正在播放: ${song.title}`;
            updateDebugInfo(`加载歌曲: ${song.title}`);
        }

        function playSong() {
            music.play().then(() => {
                updateDebugInfo("音乐开始播放");
                playButton.textContent = "暂停";
            }).catch(error => {
                updateDebugInfo(`播放失败: ${error}`);
                playButton.textContent = "重试播放";
            });
        }

        function pauseSong() {
            music.pause();
            updateDebugInfo("音乐已暂停");
            playButton.textContent = "播放";
        }

        playButton.onclick = function() {
            if (music.paused) {
                playSong();
            } else {
                pauseSong();
            }
        };

        prevButton.onclick = function() {
            currentSongIndex = (currentSongIndex - 1 + playlist.length) % playlist.length;
            loadSong(currentSongIndex);
            playSong();
        };

        nextButton.onclick = function() {
            currentSongIndex = (currentSongIndex + 1) % playlist.length;
            loadSong(currentSongIndex);
            playSong();
        };

        music.onended = function() {
            nextButton.click(); // 自动播放下一首
        };

        music.onerror = function() {
            updateDebugInfo(`音频加载错误。错误代码: ${music.error.code}`);
        };

        // 进度条更新
        music.ontimeupdate = function() {
            const percentPlayed = (music.currentTime / music.duration) * 100;
            progress.style.width = `${percentPlayed}%`;
        };

        // 点击进度条跳转
        progressBar.onclick = function(e) {
            const clickPosition = (e.pageX - this.offsetLeft) / this.offsetWidth;
            const jumpToTime = clickPosition * music.duration;
            music.currentTime = jumpToTime;
        };

        // 音量控制
        volumeSlider.oninput = function() {
            music.volume = this.value;
            updateDebugInfo(`音量设置为: ${this.value}`);
        };

        window.onload = function() {
            updateDebugInfo("加载缓慢 烦请耐心");
            loadSong(currentSongIndex);
            // 不自动播放，等待用户操作
        };
    </script>
</body>
</html>

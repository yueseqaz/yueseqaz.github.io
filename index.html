<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I'm learning!</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }
        .container {
            position: relative;
            width: 100%;
            height: 100%;
        }
        .responsive-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }
        .ascii-art {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: monospace;
            white-space: pre;
            font-size: 14px;
            color: #00FF00;
            text-shadow: 1px 1px 2px black;
            z-index: 10;
            text-align: center;
        }
        @media (max-width: 768px) {
            .ascii-art {
                font-size: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <picture>
            <source media="(max-width: 768px)" srcset="https://im.gurl.eu.org/file/c5b596438ad9869cd353f.jpg">
            <source media="(min-width: 769px)" srcset="https://img.16k.club/mofish/2024-07-18/d1743a31295ab394727f9b6b4f609f2f.webp">
            <img src="https://im.gurl.eu.org/file/9838ad667d87a2f6c56f1.jpg" alt="学习图片" class="responsive-image">
        </picture>
        <div class="ascii-art">
  ___ _             _                      _             _ 
 |_ _( )_ __ ___   | | ___  __ _ _ __ _ __ (_)_ __   __ _| |
  | ||/| '_ ` _ \  | |/ _ \/ _` | '__| '_ \| | '_ \ / _` | |
  | |  | | | | | | | |  __/ (_| | |  | | | | | | | | (_| |_|
 |___| |_| |_| |_| |_|\___|\__,_|_|  |_| |_|_|_| |_|\__, (_)
                                                    |___/   
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mylove</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }

        .full-screen-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('439696030_18020551391489136_154610390776499775_n.jpeg');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body>
    <div class="full-screen-image"></div>
    <audio id="background-music" loop>
        <source src="RPReplay_Final1723556121.m4a" type="audio/mp4">
        Your browser does not support the audio element.
    </audio>

    <script>
        window.onload = function() {
            var music = document.getElementById("background-music");
            
            // 尝试播放音乐
            var playPromise = music.play();

            if (playPromise !== undefined) {
                playPromise.then(_ => {
                    // 自动播放开始
                    console.log("音乐开始自动播放");
                })
                .catch(error => {
                    // 自动播放被阻止
                    console.log("自动播放被阻止：", error);
                    // 在这里你可以添加一个按钮让用户手动播放音乐
                });
            }
        }
    </script>
</body>
</html>

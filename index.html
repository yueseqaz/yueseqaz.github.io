<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>19组论文</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background-image: url('https://www.cnr.cn/ent/ylzt/hsjs/hd/20210819/W020210819562192955719.jpg'); /* 桌面版背景图片 */
        }

        @media only screen and (max-width: 600px) {
            body {
background-image: url('https://univs-news-1256833609.file.myqcloud.com/zmt/62c398fbfd5e42d3a7ad1f037ef96776.jpg?watermark/1/image/aHR0cDovL3VuaXZzLW5ld3MtMTI1NjgzMzYwOS5jb3MuYXAtYmVpamluZy5teXFjbG91ZC5jb20vcmVzb3VyY2VfZmlsZXMvc3lzX2ZpbGUvQS9BQS9BTVJTVy5wbmc=/gravity/southeast/scatype/3/spcent/0/dissolve/0');
                background-repeat: no-repeat;
                background-position: center;
                background-attachment: fixed;
                background-size: cover;
                /* 手机版背景图片 */
            }
        }

        #announcement {
            background-color: rgba(255, 255, 255, 0.8);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            max-width: 80%;
        }

        #announcement h1 {
            color: #ff6666; /* 公告语标题颜色 */
        }

        #announcement p {
            color: #333; /* 公告语文字颜色 */
            font-size：700;
        }

        #home-button {
            display: block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: pink; /* 主页按钮背景色 */
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            text-decoration: none;
        }

        #time-greeting {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(255, 255, 255, 0.8);
            padding: 10px 20px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div id="announcement">
        <h1>欢迎老师查看我们组的论文网站呀</h1>
        <p id="announcement-text">茫茫人海，许多人选择了用word写论文，我们组敢于创新，首次尝试用markdown加网页的方式展示此论文，若有不足，还请老师担待。点进进入主页即可查看我们组的论文，蓝色字体可点击跳转相应的百科词条.本意是想添加一个侧边目录栏 但实在影响手机端观感 所以就没有添加了！需要学习的还很多，如有不足，也麻烦老师指点一二。话不多说，进入正题吧</p>
        <a id="home-button" href="homepage.html">进入主页</a>
    </div>

    <div id="time-greeting">
        <script>
            var now = new Date();
            var hour = now.getHours();
            var minute = now.getMinutes();
            var greeting = "";

            if (hour < 10) {
                hour = "0" + hour;
            }
            if (minute < 10) {
                minute = "0" + minute;
            }

            greeting = "现在时间是：" + hour + ":" + minute + "，";

            if (hour >= 0 && hour < 7) {
                greeting += "老师，夜深了，要早点睡觉呢！";
            } else if (hour >= 7 && hour < 14) {
                greeting += "老师，早上好啊！";
            } else {
                greeting += "老师，下午好啊！";
            }

            document.write(greeting);
        </script>
    </div>
</body>
</html>

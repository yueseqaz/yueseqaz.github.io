<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sakura</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            height: 100%;
            font-family: 'Arial', sans-serif;
        }
        .container {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: url('https://images.mingming.dev/file/853d697f289ecf45a0156.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .content {
            padding: 30px;
            border-radius: 15px;
            max-width: 600px;
            width: 90%;
        }
        o {
            font-size: 18px;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            background-color: rgba(255, 105, 180, 0.7);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-size: 1.2em;
            transition: all 0.3s ease;
            margin-top: 20px;
            backdrop-filter: blur(5px);
        }
        .btn:hover {
            background-color: rgba(255, 20, 147, 0.9);
            transform: scale(1.05);
        }
        #hitokoto {
            margin-top: 30px;
            font-style: italic;
            color: #ff69b4;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="content">
            <p>Welcome to my website!click enter homepage.enjoy my gift!<(▰˘◡˘▰)> </p>
            <a href="https://sakura.rf.gd" class="btn">enter homepage </a>
            <p id="hitokoto">正在加载一言...</p>
        </div>
    </div>

    <script>
        fetch('https://v1.hitokoto.cn')
            .then(response => response.json())
            .then(data => {
                document.getElementById('hitokoto').innerText = data.hitokoto;
            })
            .catch(console.error);
    </script>
</body>
</html>

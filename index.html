<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>您的项目名称</title>
    <style>
        :root {
            --primary-color: #FFB6C1;
            --secondary-color: #FF69B4;
            --text-color: #333333;
            --background-color: #FFFFFF;
        }

        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background-color: var(--background-color);
            margin: 0;
            padding: 0;
        }

        header {
            background-color: var(--primary-color);
            padding: 1rem;
        }

        nav ul {
            list-style-type: none;
            padding: 0;
            display: flex;
            justify-content: space-around;
        }

        nav a {
            color: var(--text-color);
            text-decoration: none;
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        section {
            margin-bottom: 2rem;
        }

        h1, h2 {
            color: var(--secondary-color);
        }

        #hero {
            text-align: center;
            background-color: var(--primary-color);
            padding: 4rem 2rem;
            border-radius: 10px;
        }

        footer {
            background-color: var(--primary-color);
            color: var(--text-color);
            text-align: center;
            padding: 1rem;
            position: absolute;
            bottom: 0;
            width: 100%;
        }

        @media (max-width: 768px) {
            nav ul {
                flex-direction: column;
                align-items: center;
            }
            
            nav li {
                margin-bottom: 0.5rem;
            }
        }
        .email-link {
    display: inline-block;
    padding: 10px 20px;
    background-color: var(--secondary-color);
    color: white;
    text-decoration: none;
    border-radius: 5px;
    transition: background-color 0.3s ease;
}

.email-link:hover {
    background-color: var(--primary-color);
}
    </style>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="#about">关于项目</a></li>
                <li><a href="#features">核心特点</a></li>
                <li><a href="#how-to-use">如何使用</a></li>
                <li><a href="#contact">联系我们</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="hero">
            <h1>您的项目名称</h1>
            <p>一句简短的项目描述或口号</p>
        </section>

        <section id="about">
            <h2>关于项目</h2>
            <p>待创建</p>
        </section>

        <section id="features">
            <h2>核心特点</h2>
            <ul>
                <li>特点1</li>
                <li>特点2</li>
                <li>特点3</li>
            </ul>
        </section>

        <section id="how-to-use">
            <h2>如何使用</h2>
            <ol>
                <li>步骤1</li>
                <li>步骤2</li>
                <li>步骤3</li>
            </ol>
        </section>
<section id="contact">
    <h2>联系我们</h2>
    <p>如有任何问题,请随时联系我们:</p>
    <a href="mailto:misaki2024@proton.me" class="email-link">your.email@example.com</a>
</section>
    </main>

    <footer>
        <p>&copy; 2024 Sakura </p>
    </footer>
</body>
</html>

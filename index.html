
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sakura ASCII Art</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            color：black;
            font-family: Arial, sans-serif;
        }
        .container {
            height: 100%;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .text {
            font-size: 1rem;
            color: #00FF00;
            white-space: pre;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="text">

\___ \ / _` | |/ / | | | '__/ _` |

        </div>
    </div>
</body>
</html>

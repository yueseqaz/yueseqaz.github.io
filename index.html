<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fullpage.js Website</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/fullPage.js/4.0.20/fullpage.min.css">
    <style>
        .section {
            text-align: center;
            font-family: Arial, sans-serif;
        }
        h1 {
            font-size: 4em;
        }
        p {
            font-size: 1.5em;
        }
    </style>
</head>
<body>
    <div id="fullpage">
        <div class="section" style="background-color: #f2f2f2;">
            <h1>Welcome to My Fullpage Website</h1>
            <p>Scroll down to explore more!</p>
        </div>
        <div class="section" style="background-color: #e6e6e6;">
            <h1>Section 2</h1>
            <p>This is the second full-screen section.</p>
        </div>
        <div class="section" style="background-color: #d9d9d9;">
            <h1>Section 3</h1>
            <p>Here's the third and final section.</p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/fullPage.js/4.0.20/fullpage.min.js"></script>
    <script>
        new fullpage('#fullpage', {
            autoScrolling: true,
            scrollHorizontally: true
        });
    </script>
</body>
</html>

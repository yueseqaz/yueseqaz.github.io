<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-image: url(https://ossk.cc/file/da7e9d8c8dd9024cc7c2b.jpg);
            background-size: cover;

        }
        h1 {
            color: #1865ca;
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 0;
            font-size: 8rem;
            letter-spacing: -0.3rem;
            position: relative;
            text-align: center;


        }
h1::after{
    content: "技能学习中......敬请期待";
    color:pink;
    position: absolute;
    top: 0;
    left: 0;
    clip-path: circle(100px at 0% 50%);
    animation: movelight 5s linear infinite;
}    
@keyframes movelight{
    0%{
        clip-path: circle(100px at 100% 50%);

}
    50%{
        clip-path: circle(100px at 0% 50%);

}
    100%{
        clip-path: circle(100px at 100% 50%);
    }

}
p {
  position: absolute;
  bottom: 0;
  right: 0;
  font-size: 15px;
}


    </style>
</head>
<body>
   <h1>技能学习中......敬请期待</h1>
   <p>如果想看高数<a href="homepages.html">论文</a>请点击蓝色字体</p>
</body>
</html>

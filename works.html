<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shuttle Time Difference</title>
    <script>
        // Shuttle times in hours and minutes (Beijing Time)
        const shuttleTimes = [
            { hour: 7, minute: 20 },
            { hour: 9, minute: 10 },
            { hour: 12, minute: 10 },
            { hour: 14, minute: 10 },
            { hour: 16, minute: 10 }
        ];

        function calculateTimeDifference() {
            // Get current time in Beijing (China Standard Time, UTC+8)
            const now = new Date();
            const offset = 8 * 60;  // Offset for UTC+8
            const beijingTime = new Date(now.getTime() + (now.getTimezoneOffset() + offset) * 60000);

            // Get current hours and minutes in Beijing time
            const currentHours = beijingTime.getHours();
            const currentMinutes = beijingTime.getMinutes();

            let closestShuttleTime = null;
            let minDifference = Number.MAX_SAFE_INTEGER;

            // Iterate through each shuttle time to find the closest one
            shuttleTimes.forEach(time => {
                const shuttleDate = new Date(beijingTime);
                shuttleDate.setHours(time.hour, time.minute, 0, 0); // Set shuttle time

                const diff = (shuttleDate - beijingTime) / 60000; // Difference in minutes

                if (diff >= 0 && diff < minDifference) { // Ignore past shuttle times
                    minDifference = diff;
                    closestShuttleTime = time;
                }
            });

            if (closestShuttleTime) {
                document.getElementById("result").innerText =
                    `Next shuttle is at ${closestShuttleTime.hour}:${closestShuttleTime.minute < 10 ? '0' + closestShuttleTime.minute : closestShuttleTime.minute} (in ${Math.round(minDifference)} minutes).`;
            } else {
                document.getElementById("result").innerText = "No more shuttles today.";
            }
        }
    </script>
</head>
<body onload="calculateTimeDifference()">
    <h1>Shuttle Time Checker</h1>
    <p id="result"></p>
</body>
</html>

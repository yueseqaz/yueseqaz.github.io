<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>网站导航</title>
<style>
/* 公共样式 */
html, body {
    height: 100%;
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
}

.container {
    text-align: center;
    min-height: 100%;
    max-width: 100%;
    margin: 0 auto;
    color: pink;
    font-size: 30px;
    padding: 20px;
    background-color: rgba(255, 255, 255, 0.8); /* 半透明白色背景，以便展示背景图 */
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    position: relative;
}

h1 {
    text-align: center;
}

a {
    text-decoration: none;
    color: #333;
}

/* 电脑背景图 */
.desktop-bg {
    background-image: url('https://ossk.cc/file/da7e9d8c8dd9024cc7c2b.jpg');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
}

/* 手机背景图 */
@media (max-width: 768px) {
    .mobile-bg {
        background-image: url('https://ossk.cc/file/96c6ed4797d8e019d77b5.jpg');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
    }
}

.category {
    margin-top: 40px;
}

.category h2 {
    margin-bottom: 10px;
}

.site-list {
    list-style: none;
    padding: 0;
}

.site-list li {
    margin-bottom: 10px;
}

.site-list li a {
    display: block;
}

.search-container {
    text-align: center;
    margin-bottom: 20px;
}

.search-input {
    padding: 10px;
    width: 60%;
    max-width: 400px;
    border: 1px solid #ddd;
    border-radius: 5px;
    margin-right: 10px;
}

.search-btn {
    padding: 10px 20px;
    background-color: #333;
    color: #fff;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    transition: background-color 0.3s ease;
}

.search-btn:hover {
    background-color: #555;
}

.back-to-home {
    position: fixed;
    bottom: 20px;
    right: 20px;
}

.back-to-home a {
    display: block;
    width: 60px;
    height: 50px;
    line-height: 40px;
    text-align: center;
    background-color: pink;
    color: white;
    border-radius: 50%;
}
</style>
</head>
<body class="desktop-bg">
<div class="container">
    <h1>网站导航</h1>
    
    <!-- 搜索功能 -->
    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="输入关键词搜索">

</div>

<script>
// 搜索功能
document.getElementById('searchBtn').addEventListener('click', function() {
    var searchTerm = document.getElementById('searchInput').value.toLowerCase();
    var categories = document.querySelectorAll('.category');
    
    categories.forEach(function(category) {
        var sites = category.querySelectorAll('.site-list li');
        sites.forEach(function(site) {
            var siteName = site.innerText.toLowerCase();
            if (siteName.includes(searchTerm)) {
                site.style.display = 'block';
            } else {
                site.style.display = 'none';
            }
        });
    });
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome Page</title>
<style>
  /* Add your CSS styles here */
</style>
</head>
<body>
<div id="guideText">欢迎来到我们的网站！点击下一步，开始您的旅程。</div>
<button onclick="nextStep()">下一步</button>

<script>
  const guideTexts = [
    "欢迎来到我们的网站！点击下一步，开始您的旅程。",
    "准备好了吗？点击下一步，探索更多精彩内容！",
    "跟随我们，发现无限可能。点击下一步，开始您的体验！",
    "探索新世界的大门已经打开！点击下一步，开始您的冒险！",
    "想要了解更多？点击下一步，开始您的探索之旅！"
  ];
  let currentIndex = 0;

  function nextStep() {
    currentIndex = (currentIndex + 1) % guideTexts.length;
    document.getElementById("guideText").innerText = guideTexts[currentIndex];
  }
</script>
</body>
</html>


<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  
  html {
    width: 100%;
    height: 100%;
  }
  
  body {
    font-family: Microsoft YaHei;
    width: 100%;
    height: 100%;
  }
  
  #bg {
    width: 100%;
    height: 100%;
    position: fixed;
    z-index: -10;
    top: 0;
    left: 0;
    background-image: url(./img/bg.png);
    background-position: center;
    background-size: cover;
    background-repeat: no-repeat;
  }
  
  #bg::before {
    content: "";
    width: 100%;
    height: 100%;
    position: absolute;
    top: 0;
    left: 0;
    /* background-color: rgba(0, 0, 0, 0.2); */
  }
  
  #modal {
    display: flex;
    flex-flow: column nowrap;
    justify-content: center;
    align-items: center;
    gap: 5px;
    width: 360px;
    height: 600px;
    position: fixed;
    top: 50%;
    left: 50%;
    padding: 0 32px;
    border-top: 1px solid hsla(0, 0%, 1000%, 0.5);
    border-left: 1px solid hsla(0, 0%, 1000%, 0.5);
    background-image: linear-gradient(90deg,
        rgba(99, 99, 99, 0.1),
        rgba(99, 99, 99, 0.1) 1px,
        transparent 0,
        transparent),
      linear-gradient(90deg, hsla(0, 0%, 100%, 0.1) -20%, transparent 15%),
      linear-gradient(0deg, hsla(0, 0%, 100%, 0.1), transparent 25%, );
    background-color: rgba(0, 0, 0, 0.3);
    box-shadow: 0 0 10px 5px hsla(0, 0%, 100%, 0.15);
    backdrop-filter: blur(3px);
    border-radius: 15px;
    transform: translate(-50%, -50%);
  }
  
  .modal_text {
    font-size: 20px;
    text-align: center;
    color: #fff;
    text-shadow: 0 0 2px #000;
  }
  
  .modal__img {
    border-radius: 100%;
  }
  
  .modal__name {
    font-size: 30px;
  }
  
  .modal_tech {
    font-size: 21px;
  }
  
  .button_group {
    display: flex;
    flex-flow: column nowrap;
    width: 100%;
    margin: 10px 0;
    gap: 12px;
  }
  
  .modal__button {
    display: block;
    width: 100%;
    height: 42px;
    line-height: 40px;
    color: #000;
    background-color: #fff;
    border-radius: 8px;
    text-decoration: none;
    border: 1px solid #fff;
    transition: color .3s, background-color .3s;
  }
  
  .modal__button:hover {
    color: #fff;
    background-color: transparent;
  }
  
  .modal__button.github {
    color: #fff;
    background-color: transparent;
  }
  
  .modal__button.github:hover {
    color: #000;
    background-color: #fff;
  }
  </style>
</head>

<body>
  <div id="bg"></div>
  <div id="modal" class="modal_text">
    <img src="https://img.16k.club/mofish/2024-05-27/5247bc0017fbb2828debaab532343c79.webp" alt="avatar" class="modal__img" width="200" height="200">
    <div class="modal__name">Shiinafan</div>
    <div class="modal__intro">绘梨衣</div>
    <div class="modal_tech">
      Welcome to my website!I will let this website become more and more good!
    </div>
    <div class="button_group">
      <a href="homepages.html" class="modal__button">进入主页</a>
      <a href="/" class="modal__button github">Github</a>
    </div>
  </div>
</body>

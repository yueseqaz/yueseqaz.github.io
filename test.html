<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome Page</title>
<style>
  body {
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background-image: url(' https://ent.cnr.cn/ylzt/hsjs/hd/20210819/W020210819562192955719.jpg'); /* 修改成你的背景图路径 */
    background-size: cover;
    background-position: center;
  }

  #guideContainer {
    text-align: center;
    background-color: rgba(255, 255, 255, 0.8); /* 背景透明度可调整 */
    padding: 20px;
    border-radius: 10px;
  }

  #guideText {
    margin-bottom: 20px;
  }

  button {
    padding: 10px 20px;
    font-size: 16px;
    background-color: #007bff;
    color: #fff;
    border: none;
    border-radius: 5px;
    cursor: pointer;
  }
</style>
</head>
<body>
<div id="guideContainer">
  <div id="guideText">欢迎来到我们的网站！点击下一步，开始您的旅程。</div>
  <button onclick="nextStep()">下一步</button>
</div>

<script>
  const guideTexts = [
    "欢迎来到我们的网站！点击下一步，开始您的旅程。",
    "准备好了吗？点击下一步，探索更多精彩内容！",
    "跟随我们，发现无限可能。点击下一步，开始您的体验！",
    "探索新世界的大门已经打开！点击下一步，开始您的冒险！",
    "想要了解更多？点击下一步，开始您的探索之旅！"
  ];
  let currentIndex = 0;

  function nextStep() {
    currentIndex = (currentIndex + 1) % guideTexts.length;
    document.getElementById("guideText").innerText = guideTexts[currentIndex];
  }
</script>
</body>
</html>

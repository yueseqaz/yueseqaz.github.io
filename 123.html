<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Photo Gallery</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f2f2f2;
            margin: 0;
            padding: 0;
        }
        h1 {
            margin-top: 50px;
            font-size: 28px;
        }
        #passwordForm {
            margin-top: 20px;
        }
        input[type="password"] {
            padding: 10px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-right: 10px;
        }
        #submitBtn {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 8px;
            transition: background-color 0.3s ease;
        }
        #submitBtn:hover {
            background-color: #0056b3;
        }
        #gallery {
            margin-top: 50px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }
        #gallery img {
            max-width: 90%;
            max-height: 300px;
            margin: 10px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
            display: none;
        }
        #gallery img:hover {
            transform: scale(1.1);
        }
        #backBtn {
            margin-top: 20px;
            display: inline-block;
            padding: 10px 20px;
            font-size: 16px;
            background-color: #ccc;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            color: #000;
            transition: background-color 0.3s ease;
        }
        #backBtn:hover {
            background-color: #bbb;
        }
    </style>
</head>
<body>
    <h1>Welcome to the Travel Photo Gallery</h1>
    <div id="passwordForm">
        <form id="loginForm">
            <label for="password">Enter the password:</label>
            <input type="password" id="password" required>
            <button type="submit" id="submitBtn">Enter</button>
        </form>
    </div>

    <div id="gallery">
        <img src="https://img.16k.club/mofish/2024-04-21/6c069c534bb569523d5aed67ec651433.webp" alt="Image 1">
        <img src="https://img.16k.club/mofish/2024-04-02/926d717ef896bc950200c1119d79c50a.webp" alt="Image 2">
        <img src="image3.jpg" alt="Image 3">
        <!-- Add more images as needed -->
    </div>

    <a id="backBtn" href="index.html">Back to Homepage</a>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault(); // Prevent form submission
            var password = document.getElementById('password').value;
            if (password === '2024') {
                document.getElementById('passwordForm').style.display = 'none';
                var images = document.querySelectorAll('#gallery img');
                images.forEach(function(img) {
                    img.style.display = 'block';
                });
            } else {
                alert('Incorrect password. Please try again.');
            }
        });

        document.getElementById('backBtn').addEventListener('click', function(event) {
            event.preventDefault();
            window.location.href = '/';
        });
    </script>
</body>
</html>


<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创意分贝检测器</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            transition: background-color 0.3s;
        }
        #container {
            text-align: center;
        }
        #meter {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 10px solid #333;
            margin: 20px auto;
            position: relative;
            overflow: hidden;
        }
        #needle {
            width: 4px;
            height: 100px;
            background-color: red;
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom;
            transition: transform 0.1s;
        }
        #decibelValue {
            font-size: 24px;
            font-weight: bold;
        }
        button {
            font-size: 18px;
            padding: 10px 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="container">
        <h1>创意分贝检测器</h1>
        <div id="meter">
            <div id="needle"></div>
        </div>
        <p>当前环境音分贝: <span id="decibelValue">0</span> dB</p>
        <button id="startButton">开始检测</button>
    </div>

    <script>
        const startButton = document.getElementById('startButton');
        const decibelValue = document.getElementById('decibelValue');
        const needle = document.getElementById('needle');
        const body = document.body;

        startButton.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                const audioContext = new AudioContext();
                const source = audioContext.createMediaStreamSource(stream);
                const analyser = audioContext.createAnalyser();
                analyser.fftSize = 2048;
                source.connect(analyser);

                function updateDecibels() {
                    const dataArray = new Float32Array(analyser.frequencyBinCount);
                    analyser.getFloatTimeDomainData(dataArray);
                    
                    let sum = 0;
                    for (let i = 0; i < dataArray.length; i++) {
                        sum += dataArray[i] * dataArray[i];
                    }
                    const rms = Math.sqrt(sum / dataArray.length);
                    const decibels = 20 * Math.log10(rms / 0.00002);
                    const roundedDecibels = Math.max(0, Math.round(decibels));

                    decibelValue.textContent = roundedDecibels;
                    
                    // 更新指针位置
                    const rotation = Math.min(roundedDecibels, 120) * 1.5 - 90; // 最大120分贝，转换为-90到90度
                    needle.style.transform = `rotate(deg)`;

                    // 更新背景颜色
                    const hue = Math.max(0, 120 - roundedDecibels);
                    body.style.backgroundColor = `hsl(, 100%, 50%)`;

                    requestAnimationFrame(updateDecibels);
                }

                updateDecibels();
                startButton.disabled = true;
            } catch (err) {
                console.error('Error accessing microphone:', err);
                alert('无法访问麦克风。请确保您已授予网页访问麦克风的权限。');
            }
        });
    </script>
</body>

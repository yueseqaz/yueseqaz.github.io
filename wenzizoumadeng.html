
<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>环境音分贝检测</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        #decibelMeter {
            font-size: 48px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="decibelMeter">
        <p>当前环境音分贝: <span id="decibelValue">0</span> dB</p>
        <button id="startButton">开始检测</button>
    </div>

    <script>
        const startButton = document.getElementById('startButton');
        const decibelValue = document.getElementById('decibelValue');

        startButton.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                const audioContext = new AudioContext();
                const source = audioContext.createMediaStreamSource(stream);
                const analyser = audioContext.createAnalyser();
                analyser.fftSize = 2048;
                source.connect(analyser);

                function updateDecibels() {
                    const dataArray = new Uint8Array(analyser.frequencyBinCount);
                    analyser.getByteFrequencyData(dataArray);
                    const average = dataArray.reduce((sum, value) => sum + value, 0) / dataArray.length;
                    const decibels = Math.round(average);
                    decibelValue.textContent = decibels;
                    requestAnimationFrame(updateDecibels);
                }

                updateDecibels();
                startButton.disabled = true;
            } catch (err) {
                console.error('Error accessing microphone:', err);
                alert('无法访问麦克风。请确保您已授予网页访问麦克风的权限。');
            }
        });
    </script>
</body>
</html>

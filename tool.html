<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UptimeRobot Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/0.21.1/axios.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
        }
        #monitorList {
            list-style-type: none;
            padding: 0;
        }
        #monitorList li {
            background: #f8f8f8;
            border: 1px solid #ddd;
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 4px;
        }
        .status {
            font-weight: bold;
        }
        .up { color: green; }
        .down { color: red; }
        .paused { color: orange; }
    </style>
</head>
<body>
    <div class="container">
        <h1>UptimeRobot Dashboard</h1>
        <div id="error" style="color: red;"></div>
        <ul id="monitorList"></ul>
    </div>

    <script>
        const API_KEY = 'u2594309-99a99a837d8cdd32554c09a1';
        const API_URL = 'https://api.uptimerobot.com/v2/getMonitors';

        async function fetchMonitors() {
            try {
                const response = await axios.post(API_URL, {
                    api_key: API_KEY,
                    format: 'json',
                    logs: 0
                }, {
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    }
                });

                const monitors = response.data.monitors;
                const monitorList = document.getElementById('monitorList');
                monitorList.innerHTML = '';

                monitors.forEach(monitor => {
                    const li = document.createElement('li');
                    const statusClass = monitor.status === 2 ? 'up' : (monitor.status === 9 ? 'down' : 'paused');
                    li.innerHTML = `
                        <strong>${monitor.friendly_name}</strong><br>
                        Status: <span class="status ${statusClass}">${getStatusText(monitor.status)}</span><br>
                        URL: ${monitor.url}<br>
                        Type: ${getMonitorType(monitor.type)}
                    `;
                    monitorList.appendChild(li);
                });
            } catch (error) {
                document.getElementById('error').textContent = 'Error fetching monitors: ' + error.message;
            }
        }

        function getStatusText(status) {
            switch(status) {
                case 0: return 'Paused';
                case 2: return 'Up';
                case 9: return 'Down';
                default: return 'Unknown';
            }
        }

        function getMonitorType(type) {
            const types = {
                1: 'HTTP(s)',
                2: 'Keyword',
                3: 'Ping',
                4: 'Port',
                5: 'Heartbeat'
            };
            return types[type] || 'Unknown';
        }

        fetchMonitors();
    </script>
</body>
</html>

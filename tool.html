<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全屏图片展示</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .fullscreen-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-color: #000;
        }
        .fullscreen-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            padding: 10px;
            text-align: center;
            transition: opacity 0.3s ease;
        }
        .fullscreen-container:hover .overlay {
            opacity: 1;
        }
        .overlay h1 {
            margin: 0 0 10px 0;
            font-size: 24px;
        }
        .overlay p {
            margin: 0;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="fullscreen-container">
        <img src="439696030_18020551391489136_154610390776499775_n.jpeg" alt="全屏展示图片" class="fullscreen-image">
        <div class="overlay">
            <h1>图片展示</h1>
            <p>这是一张全屏展示的特别图片</p>
        </div>
    </div>
</body>
</html>

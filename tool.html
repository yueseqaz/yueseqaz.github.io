<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>UptimeRobot 监控数据</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            background-color: #ffffff;
            border-radius: 10px;
            padding: 50px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 10px;
            border: 1px solid #dddddd;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.3.2/axios.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/gsap.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>UptimeRobot 监控数据</h1>
        <table id="monitorTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>名称</th>
                    <th>类型</th>
                    <th>状态</th>
                    <th>最后检查时间</th>
                </tr>
            </thead>
            <tbody id="monitorData">
                <!-- 数据将动态填充到这里 -->
            </tbody>
        </table>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const apiKey = 'u2594309-99a99a837d8cdd32554c09a1';
            const apiUrl = 'https://api.uptimerobot.com/v2/getMonitors';

            axios.get(apiUrl, {
                params: {
                    api_key: apiKey,
                    format: 'json',
                    nojsoncallback: 1,
                    logs: 1
                }
            })
            .then(response => {
                const monitors = response.data.monitors.monitor;
                const monitorDataElement = document.getElementById('monitorData');

                monitors.forEach(monitor => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${monitor.id}</td>
                        <td>${monitor.friendly_name}</td>
                        <td>${monitor.type}</td>
                        <td>${monitor.status}</td>
                        <td>${monitor.last_check}</td>
                    `;
                    monitorDataElement.appendChild(row);
                });

                // 添加 GSAP 动画
                gsap.from('.container', { duration: 1, y: 50, opacity: 0, ease: 'power3.out' });
            })
            .catch(error => {
                console.error('获取监控数据失败:', error);
            });
        });
    </script>
</body>
</html>

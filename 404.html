<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>404 - 页面未找到</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            background-color: #ffffff;
            border-radius: 10px;
            padding: 50px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .error-code {
            color: #333333;
            font-size: 5em;
            margin-bottom: 20px;
        }

        .message {
            color: #666666;
            font-size: 1.2em;
            margin-bottom: 30px;
        }

        .back-button {
            background-color: #007BFF;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.1em;
            transition: background-color 0.3s;
        }

        .back-button:hover {
            background-color: #0056b3;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/ScrollTrigger.min.js"></script>
</head>
<body>
    <div class="container">
        <h1 class="error-code">404</h1>
        <p class="message">页面未找到</p>
        <button class="back-button" onclick="location.href='https://files.catbox.moe/5v0nkh.zip'">回到主页</button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            gsap.from('.error-code', { duration: 1, y: 50, opacity: 0, ease: 'power3.out' });
            gsap.from('.message', { duration: 1, y: 50, opacity: 0, delay: 0.5, ease: 'power3.out' });
            gsap.from('.back-button', { duration: 1, x: 50, opacity: 0, delay: 1, ease: 'power3.out' });
        });
    </script>
</body>
</html>

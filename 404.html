<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>静态HTML网页</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
        }

        .container {
            display: flex;
            width: 100%;
        }

        .sidebar {
            width: 250px;
            background-color: #f4f4f4;
            padding: 20px;
            box-shadow: 2px 0 5px rgba(0, 0, 0, 0.1);
            overflow-y: auto;
            height: 100vh;
            position: fixed;
        }

        .sidebar ul {
            list-style-type: none;
            padding: 0;
        }

        .sidebar ul li {
            margin-bottom: 10px;
        }

        .sidebar ul li a {
            text-decoration: none;
            color: #333;
            display: block;
        }

        .sidebar ul li ul {
            margin-top: 10px;
            padding-left: 20px;
        }

        .content {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            margin-left: 270px;
            height: 100vh;
        }

        #content-area {
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background-color: #f9f9f9;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <ul id="toc"></ul>
        </div>
        <div class="content">
            <div id="content-area">
                <!-- 用户粘贴的HTML内容放在这里 -->
                <h1>引言</h1>
                <p>这是引言的内容。</p>

                <h2>高等数学的发展历史</h2>
                <p>高等数学的发展历史内容。</p>

                <h2>函数与极限</h2>
                <h3>单变量函数的极限</h3>
                <p>单变量函数的极限内容。</p>

                <h3>方向导数</h3>
                <p>方向导数内容。</p>

                <h3>多元函数的极限</h3>
                <p>多元函数的极限内容。</p>

                <h2>导数的定义与性质</h2>
                <p>导数的定义与性质内容。</p>

                <h2>其他</h2>
                <p>其他内容。</p>
            </div>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var contentArea = document.getElementById('content-area');
            var toc = document.getElementById('toc');

            // 生成目录
            var headers = contentArea.querySelectorAll('h1, h2, h3, h4, h5, h6');
            headers.forEach(function(header) {
                var level = parseInt(header.tagName[1]);
                var text = header.textContent;
                var id = text.toLowerCase().replace(/[^\w]+/g, '-');

                header.id = id;

                var li = document.createElement('li');
                li.style.marginLeft = (level - 1) * 20 + 'px';

                var a = document.createElement('a');
                a.href = '#' + id;
                a.textContent = text;

                li.appendChild(a);
                toc.appendChild(li);
            });
        });
    </script>
</body>
</html>

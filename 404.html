<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>静态Markdown网页</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
        }

        .container {
            display: flex;
            width: 100%;
        }

        .sidebar {
            width: 250px;
            background-color: #f4f4f4;
            padding: 20px;
            box-shadow: 2px 0 5px rgba(0, 0, 0, 0.1);
            overflow-y: auto;
            height: 100vh;
        }

        .sidebar ul {
            list-style-type: none;
            padding: 0;
        }

        .sidebar ul li {
            margin-bottom: 10px;
        }

        .sidebar ul li a {
            text-decoration: none;
            color: #333;
            display: block;
        }

        .sidebar ul li ul {
            margin-top: 10px;
            padding-left: 20px;
        }

        .content {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
        }

        #rendered-content {
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background-color: #f9f9f9;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <ul id="toc"></ul>
        </div>
        <div class="content">
            <div id="rendered-content"></div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 预定义的Markdown内容
            var initialMarkdown = `
# 引言
这是引言的内容。

## 高等数学的发展历史
高等数学的发展历史内容。

## 函数与极限
### 单变量函数的极限
单变量函数的极限内容。

### 方向导数
方向导数内容。

### 多元函数的极限
多元函数的极限内容。

## 导数的定义与性质
导数的定义与性质内容。

## 其他
其他内容。
            `;

            var renderedContent = document.getElementById('rendered-content');
            var toc = document.getElementById('toc');

            // 渲染Markdown内容
            renderedContent.innerHTML = marked(initialMarkdown);

            // 生成目录
            var headers = renderedContent.querySelectorAll('h1, h2, h3, h4, h5, h6');
            headers.forEach(function(header) {
                var level = parseInt(header.tagName[1]);
                var text = header.textContent;
                var id = text.toLowerCase().replace(/[^\w]+/g, '-');

                header.id = id;

                var li = document.createElement('li');
                li.style.marginLeft = (level - 1) * 20 + 'px';

                var a = document.createElement('a');
                a.href = '#' + id;
                a.textContent = text;

                li.appendChild(a);
                toc.appendChild(li);
            });
        });
    </script>
</body>
</html>

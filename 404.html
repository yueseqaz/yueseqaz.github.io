<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown支持的网页</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
        }

        .container {
            display: flex;
            width: 100%;
        }

        .sidebar {
            width: 250px;
            background-color: #f4f4f4;
            padding: 20px;
            box-shadow: 2px 0 5px rgba(0, 0, 0, 0.1);
            overflow-y: auto;
            height: 100vh;
        }

        .sidebar ul {
            list-style-type: none;
            padding: 0;
        }

        .sidebar ul li {
            margin-bottom: 10px;
        }

        .sidebar ul li a {
            text-decoration: none;
            color: #333;
            display: block;
        }

        .sidebar ul li ul {
            margin-top: 10px;
            padding-left: 20px;
        }

        .content {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
        }

        textarea#markdown-input {
            width: 100%;
            height: 150px;
            padding: 10px;
            margin-bottom: 10px;
            font-family: monospace;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        button#render-button {
            padding: 10px 20px;
            margin-bottom: 20px;
            background-color: #007BFF;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button#render-button:hover {
            background-color: #0056b3;
        }

        #rendered-content {
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background-color: #f9f9f9;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <ul>
                <li><a href="#introduction">引言</a></li>
                <li><a href="#history">高等数学的发展历史</a></li>
                <li><a href="#functions-and-limits">函数与极限</a>
                    <ul>
                        <li><a href="#single-variable-functions">单变量函数的极限</a></li>
                        <li><a href="#directional-derivatives">方向导数</a></li>
                        <li><a href="#multivariable-limits">多元函数的极限</a></li>
                    </ul>
                </li>
                <li><a href="#derivatives">导数的定义与性质</a></li>
                <li><a href="#others">...</a></li>
            </ul>
        </div>
        <div class="content">
            <textarea id="markdown-input" placeholder="在此输入Markdown内容"></textarea>
            <button id="render-button">渲染</button>
            <div id="rendered-content"></div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var renderButton = document.getElementById('render-button');
            var markdownInput = document.getElementById('markdown-input');
            var renderedContent = document.getElementById('rendered-content');

            renderButton.addEventListener('click', function() {
                var markdownText = markdownInput.value;
                var htmlContent = marked(markdownText);
                renderedContent.innerHTML = htmlContent;
            });

            // 初始导航栏的折叠功能
            var toggles = document.querySelectorAll('.sidebar ul li > a');

            toggles.forEach(function(toggle) {
                toggle.addEventListener('click', function(event) {
                    var nestedList = this.nextElementSibling;
                    if (nestedList && nestedList.tagName === 'UL') {
                        event.preventDefault();
                        nestedList.style.display = nestedList.style.display === 'none' ? 'block' : 'none';
                    }
                });
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日程表</title>
  <!-- Add Font Awesome CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f5f5f5;
    }
    .container {
      max-width: 800px;
      margin: 20px auto;
      padding: 20px;
      background-color: #fff;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }
    h1 {
      text-align: center;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      text-align: left;
    }
    th {
      background-color: #f2f2f2;
    }
    .return-home {
      text-align: center;
      margin-top: 20px;
    }
    .return-home a {
      text-decoration: none;
      color: #333;
      font-size: 16px;
    }
    .return-home a i {
      margin-right: 5px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>我的日程表</h1>
  
  <table>
    <tr>
      <th>日期</th>
      <th>事件</th>
    </tr>
    <tr>
        <td>2024-04-30-19:00</td>
        <td>离校</td>
    </tr>
    <tr>
      <td>2024-05-01</td>
      <td>旅游</td>
    </tr>
    <tr>
      <td>2024-05-02</td>
      <td>旅游</td>
    </tr>
    <tr>
      <td>2024-05-03</td>
      <td>旅游</td>
    </tr>
    <tr>
        <td>2024-05-04</td>
        <td>旅游</td>
    </tr>
    <tr>
        <td>2024-05-04</td>
        <td>返校</td>
    </tr>
    <!-- Add more rows as needed -->
  </table>

  <div class="return-home">
    <a href="#"><i class="fas fa-home"></i>返回主页</a>
  </div>
</div>

</body>
</html>
